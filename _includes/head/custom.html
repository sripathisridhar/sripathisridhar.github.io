{% include base_path %}

<!-- start custom head snippets -->

<!-- Icon fonts loaded synchronously from CDN (CORS-enabled fonts that render on first paint) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6/css/all.min.css">

<!-- Always reserve the vertical scrollbar so page width (and the theme's responsive
     font-size) stays identical between short and long pages.
     Also hide the greedy-nav overflow toggle on widths where the few nav links always
     fit (the theme leaves a phantom hamburger visible even with nothing to collapse). -->
<style>
  html { overflow-y: scroll; }
  @media (min-width: 600px) { .greedy-nav > button { display: none !important; } }
</style>

<!-- favicon from https://commons.wikimedia.org/wiki/File:OOjs_UI_icon_academic-progressive.svg -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="var(--global-bg-color)"/>

<!-- end custom head snippets -->
